name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install package + test deps
        run: |
          uv pip install --system -e ".[dev]"

      - name: Verify CLI installs
        run: |
          desktop-harness --version
          dh --version

      - name: Run tests (unit only — live tests need GUI permissions)
        run: |
          pytest tests/ -q --tb=short --timeout=60

      - name: Smoke-test the MCP server
        run: |
          python -c "
          import json, subprocess, time
          p = subprocess.Popen(
              ['desktop-harness', 'mcp'],
              stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE,
          )
          send = lambda m: (p.stdin.write((json.dumps(m)+'\n').encode()), p.stdin.flush())
          send({'jsonrpc':'2.0','id':1,'method':'initialize','params':{'protocolVersion':'2025-06-18','capabilities':{},'clientInfo':{'name':'ci','version':'0'}}})
          send({'jsonrpc':'2.0','method':'notifications/initialized'})
          send({'jsonrpc':'2.0','id':2,'method':'tools/list'})
          send({'jsonrpc':'2.0','id':3,'method':'tools/call','params':{'name':'version','arguments':{}}})
          time.sleep(2); p.stdin.close()
          out = p.stdout.read().decode()
          assert '\"tools\":' in out, out[:500]
          assert 'tool_count' in out, out[:500]
          print('MCP smoke OK')
          "

  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ || true   # informational for now
